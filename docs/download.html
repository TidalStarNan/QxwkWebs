<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>下载中心 - 青翔未阔工作室</title>
    <meta name="description" content="青翔未阔工作室文件下载中心，Minecraft 服务器客户端、各类资源文件一键下载。">
    <link rel="icon" type="image/webp" href="/favicon.webp">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --secondary: #0d9488; --surface: #ffffff; --bg: #f8fafc;
            --text-primary: #0f172a; --text-secondary: #64748b; --text-tertiary: #94a3b8;
            --border: #e2e8f0; --navbar-bg: rgba(255, 255, 255, 0.8);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius-sm: 8px; --radius-md: 14px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
            --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --container: 1100px; --nav-height: 64px;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans); background: var(--bg); color: var(--text-primary);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        /* Navbar */
        .navbar { position: sticky; top: 0; width: 100%; height: var(--nav-height); z-index: 100;
            background: var(--navbar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border); }
        .navbar-inner { max-width: var(--container); margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between; height: 100%; }
        .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary);
            font-weight: 600; font-size: 1.15rem; letter-spacing: 0.3px; transition: opacity var(--transition); }
        .navbar-brand:hover { opacity: 0.85; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
            background: rgba(37,99,235,0.15); color: var(--text-primary); text-decoration: none;
            border-radius: 40px; font-size: 0.88rem; font-weight: 500;
            backdrop-filter: blur(4px); border: 1px solid rgba(147,197,253,0.35);
            transition: all var(--transition); white-space: nowrap; }
        .back-link:hover { background: rgba(37,99,235,0.3); border-color: rgba(147,197,253,0.6); transform: scale(1.02); }
        /* Main */
        .main { flex: 1; padding: 36px 24px 60px; }
        .container { max-width: var(--container); margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: 16px; margin-bottom: 28px; }
        .page-header h1 { font-size: clamp(1.4rem,3vw,1.8rem); font-weight: 700; color: var(--text-primary); }
        /* Tabs */
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 9px 22px; background: var(--surface); color: var(--text-secondary);
            border: 1px solid var(--border); border-radius: 40px; font-size: 0.88rem; cursor: pointer;
            transition: all var(--transition); font-weight: 500; }
        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border-color: var(--primary); }
        /* Current path */
        .current-path { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px 18px; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 18px; }
        .current-path span { font-weight: 600; color: var(--text-primary); }
        /* Table */
        .table-wrap { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); overflow-x: auto; -webkit-overflow-scrolling: touch;
            box-shadow: var(--shadow-sm); }
        .file-table { width: 100%; border-collapse: collapse; table-layout: auto; min-width: 600px; }
        .file-table thead { background: var(--bg); border-bottom: 2px solid var(--border); }
        .file-table th { padding: 13px 18px; text-align: left; font-weight: 600;
            color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 0.3px; white-space: nowrap; }
        .file-table td { padding: 13px 18px; border-bottom: 1px solid var(--border);
            color: var(--text-primary); font-size: 0.88rem; vertical-align: middle; }
        .file-table tbody tr:last-child td { border-bottom: none; }
        .file-table tbody tr:hover { background: rgba(37,99,235,0.03); }
        .file-name-cell { display: flex; align-items: center; gap: 10px; }
        .file-icon { width: 24px; text-align: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .file-name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        .download-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; text-decoration: none; border-radius: 40px;
            font-size: 0.82rem; transition: all var(--transition); white-space: nowrap; }
        .download-btn:hover { background: linear-gradient(135deg, var(--primary-hover), #0f766e); transform: scale(1.02); }
        /* States */
        .loading-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 0.95rem; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; margin-right: 10px;
            border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 0.92rem; }
        .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
            padding: 14px 18px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 0.88rem; }
        /* Footer */
        .footer { background: #0f172a; text-align: center; padding: 28px 24px;
            color: var(--text-tertiary); font-size: 0.82rem; border-top: 1px solid rgba(255,255,255,0.06); }
        .footer-copy { opacity: 0.6; }
        /* Responsive */
        @media (max-width: 640px) {
            .page-header { flex-direction: column; align-items: flex-start; }
            .navbar-inner { padding: 0 16px; }
            .main { padding: 24px 16px 40px; }
            .file-table th, .file-table td { padding: 11px 14px; }
            .tabs { gap: 8px; }
            .tab-btn { padding: 8px 18px; font-size: 0.84rem; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <img src="/favicon.webp" alt="青翔未阔工作室" width="28" height="28" style="border-radius:5px; flex-shrink:0;">
                <span>青翔未阔工作室</span>
            </a>
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                返回首页
            </a>
        </div>
    </header>

    <div class="main">
        <div class="container">
            <div class="page-header">
                <h1>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px; margin-right:8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载中心
                </h1>
            </div>
            <div class="tabs" id="tabBar">
                <button class="tab-btn active" data-path="mcpack-yz">一中整合包下载</button>
                <button class="tab-btn" data-path="image-logo">工作室 Logo 和壁纸下载</button>
                <button class="tab-btn" data-path="temp">临时文件下载</button>
            </div>
            <div class="current-path">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:4px;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                当前位置：<span id="pathDisplay">加载中...</span>
            </div>
            <div id="fileListContainer">
                <div class="loading-state"><span class="loading-spinner"></span>正在加载文件列表</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-copy">2026 青翔未阔工作室</div>
    </footer>

    <script>
        const CONFIG = { owner: 'TidalStarNan', repo: 'QxwkFiles', branch: 'main' };
        let currentPath = 'mcpack-yz';

        function extractDateFromFileName(name) {
            const m = name.match(/^(\d{2})\.(\d{2})\.(\d{2})/);
            if (!m) return null;
            return new Date(2000 + parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        }
        function formatDate(d) { if (!d) return '-'; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function getFileType(name) {
            const ext = name.toLowerCase().split('.').pop();
            const map = { 'pdf':'PDF 文档','doc':'Word 文档','docx':'Word 文档','xls':'Excel 表格','xlsx':'Excel 表格','ppt':'PowerPoint','pptx':'PowerPoint','txt':'文本文档','jpg':'JPEG 图片','jpeg':'JPEG 图片','png':'PNG 图片','gif':'GIF 图片','webp':'WebP 图片','mp4':'MP4 视频','mp3':'MP3 音频','zip':'压缩文件','rar':'RAR 压缩','7z':'7-Zip 压缩','exe':'应用程序','msi':'安装包','dmg':'macOS 映像','iso':'光盘映像','apk':'Android 安装包' };
            return map[ext] || `${ext.toUpperCase()} 文件`;
        }
        function getFileIcon(name) {
            const ext = name.toLowerCase().split('.').pop();
            const icons = {
                pdf:'📄', doc:'📝', docx:'📝', txt:'📃', xls:'📊', xlsx:'📊', ppt:'📽️', pptx:'📽️',
                jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', mp4:'🎬', mp3:'🎵',
                zip:'📦', rar:'📦', '7z':'📦', exe:'⚙️', msi:'💿', dmg:'💿', iso:'💿', apk:'📱'
            };
            return icons[ext] || '📄';
        }
        function formatSize(bytes) {
            if (!bytes || bytes === 0) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(2) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }
        async function fetchFiles(path) {
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`;
            const r = await fetch(url);
            if (!r.ok) throw new Error(`请求失败 (${r.status})`);
            return (await r.json()).filter(f => f.type === 'file');
        }
        function renderFileList(files, path) {
            const container = document.getElementById('fileListContainer');
            document.getElementById('pathDisplay').textContent = path;
            if (!files || files.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 该文件夹暂无文件</div>'; return;
            }
            const filtered = files.filter(f => !f.name.startsWith('.'));
            const sorted = filtered.sort((a,b) => {
                const da = extractDateFromFileName(a.name), db = extractDateFromFileName(b.name);
                if (da && db) return db - da;
                if (da && !db) return -1; if (!da && db) return 1;
                return b.name.localeCompare(a.name);
            });
            let html = `<div class="table-wrap"><table class="file-table"><thead><tr><th>名称</th><th>修改日期</th><th>类型</th><th>大小</th><th></th></tr></thead><tbody>`;
            sorted.forEach(f => {
                const date = formatDate(extractDateFromFileName(f.name));
                html += `<tr>
                    <td><div class="file-name-cell"><span class="file-icon">${getFileIcon(f.name)}</span><span class="file-name-text" title="${esc(f.name)}">${esc(f.name)}</span></div></td>
                    <td>${date}</td><td>${getFileType(f.name)}</td><td>${formatSize(f.size)}</td>
                    <td><a href="${f.download_url}" class="download-btn" download target="_blank">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        下载</a></td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }
        function showError(msg) {
            document.getElementById('fileListContainer').innerHTML = `<div class="error-msg">❌ 加载失败：${esc(msg)}</div><div class="empty-state">请检查网络连接或稍后重试。</div>`;
        }
        async function loadPath(path) {
            currentPath = path;
            document.getElementById('fileListContainer').innerHTML = '<div class="loading-state"><span class="loading-spinner"></span>正在加载文件列表</div>';
            try { const f = await fetchFiles(path); renderFileList(f, path); }
            catch (e) { showError(e.message); }
        }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        document.getElementById('tabBar').querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                loadPath(this.getAttribute('data-path'));
            });
        });
        loadPath(currentPath);
    </script>
</body>
</html>
