<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 服务器状态 - 青翔未阔工作室</title>
    <meta name="description" content="Minecraft 服务器在线状态查询工具，输入服务器地址即可查看在线状态、MOTD、玩家列表与版本信息。">
    <link rel="icon" type="image/webp" href="/favicon.webp">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --secondary: #0d9488;
            --surface: #ffffff; --bg: #f8fafc;
            --text-primary: #0f172a; --text-secondary: #64748b; --text-tertiary: #94a3b8;
            --border: #e2e8f0; --navbar-bg: rgba(255,255,255,0.8);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius-sm: 8px; --radius-md: 14px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
            --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --container: 1100px; --nav-height: 64px;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans); background: var(--bg); color: var(--text-primary);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .navbar { position: sticky; top: 0; width: 100%; height: var(--nav-height); z-index: 100;
            background: var(--navbar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border); }
        .navbar-inner { max-width: var(--container); margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between; height: 100%; }
        .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary);
            font-weight: 600; font-size: 1.15rem; letter-spacing: 0.3px; transition: opacity var(--transition); }
        .navbar-brand:hover { opacity: 0.85; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
            background: rgba(37,99,235,0.15); color: var(--text-primary); text-decoration: none;
            border-radius: 40px; font-size: 0.88rem; font-weight: 500;
            backdrop-filter: blur(4px); border: 1px solid rgba(147,197,253,0.35);
            transition: all var(--transition); white-space: nowrap; }
        .back-link:hover { background: rgba(37,99,235,0.3); border-color: rgba(147,197,253,0.6); transform: scale(1.02); }
        .main { flex: 1; padding: 36px 24px 60px; }
        .container { max-width: var(--container); margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: 16px; margin-bottom: 28px; }
        .page-header h1 { font-size: clamp(1.4rem,3vw,1.8rem); font-weight: 700; color: var(--text-primary); }
        /* Search card */
        .search-card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 24px; box-shadow: var(--shadow-sm); margin-bottom: 24px; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px 18px; border: 1.5px solid var(--border);
            border-radius: 40px; font-size: 0.92rem; outline: none;
            transition: border-color var(--transition); font-family: inherit; }
        .input-group input:focus { border-color: var(--primary); }
        .input-group button { display: inline-flex; align-items: center; gap: 6px; padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; border-radius: 40px;
            font-size: 0.92rem; font-weight: 600; cursor: pointer;
            transition: all var(--transition); white-space: nowrap; font-family: inherit; }
        .input-group button:hover { background: linear-gradient(135deg, var(--primary-hover), #0f766e); transform: scale(1.02); }
        .input-group button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .example-hint { margin-top: 12px; font-size: 0.82rem; color: var(--text-tertiary); }
        /* Result card */
        .result-card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 28px; box-shadow: var(--shadow-sm); }
        .loading-indicator { text-align: center; padding: 40px; color: var(--text-secondary); }
        .initial-placeholder { text-align: center; padding: 40px; color: var(--text-tertiary); }
        .server-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
            padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .server-icon { width: 60px; height: 60px; background: var(--bg); border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .server-icon img { width: 100%; height: 100%; object-fit: contain; }
        .server-info h2 { font-size: 1.3rem; color: var(--text-primary); margin-bottom: 4px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .server-info .address { color: var(--text-secondary); font-family: monospace; font-size: 0.85rem; }
        .status-badge { display: inline-block; padding: 3px 12px; border-radius: 40px;
            font-size: 0.78rem; font-weight: 600; }
        .status-badge.online { background: #d1fae5; color: #065f46; }
        .status-badge.offline { background: #fee2e2; color: #991b1b; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px; margin-bottom: 20px; }
        .detail-item { background: var(--bg); padding: 16px 18px; border-radius: var(--radius-sm); }
        .detail-label { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-value { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); }
        .motd-box { background: var(--bg); border-radius: var(--radius-sm); padding: 18px; }
        .motd-label { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px; }
        .motd-content { font-family: monospace; line-height: 1.6; font-size: 0.9rem; word-break: break-word; }
        .players-section { margin-top: 16px; }
        .players-section h4 { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .players-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .player-tag { background: var(--bg); border: 1px solid var(--border); padding: 4px 14px;
            border-radius: 40px; font-size: 0.84rem; }
        .error-message { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
            padding: 14px 18px; border-radius: var(--radius-sm); margin-top: 16px; font-size: 0.88rem; }
        .spinner { display: inline-block; width: 20px; height: 20px; margin-right: 8px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
        .hidden { display: none !important; }
        .footer-note { text-align: center; margin-top: 16px; color: var(--text-tertiary); font-size: 0.8rem; }
        .footer { background: #0f172a; text-align: center; padding: 28px 24px;
            color: var(--text-tertiary); font-size: 0.82rem; border-top: 1px solid rgba(255,255,255,0.06); }
        .footer-copy { opacity: 0.6; }
        @media (max-width: 640px) {
            .page-header { flex-direction: column; align-items: flex-start; }
            .navbar-inner { padding: 0 16px; }
            .main { padding: 24px 16px 40px; }
            .search-card { padding: 18px; }
            .result-card { padding: 20px; }
            .input-group { flex-direction: column; }
            .input-group button { justify-content: center; }
            .server-header { flex-direction: column; text-align: center; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-inner">
            <a href="../index.html" class="navbar-brand">
                <img src="/favicon.webp" alt="青翔未阔工作室" width="28" height="28" style="border-radius:5px; flex-shrink:0;">
                <span>青翔未阔工作室</span>
            </a>
            <a href="../index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                返回首页
            </a>
        </div>
    </header>

    <div class="main">
        <div class="container">
            <div class="page-header">
                <h1>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px; margin-right:8px;"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M17 12h.01"/><path d="M7 12h.01"/></svg>
                    MC 服务器状态
                </h1>
            </div>

            <div class="search-card">
                <div class="input-group">
                    <input type="text" id="serverInput" placeholder="输入服务器地址，例如: hypixel.net 或 mc.example.com:25565">
                    <button id="queryBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        查询
                    </button>
                </div>
                <div class="example-hint">试试这些热门服务器：hypixel.net、mc.hypixel.net、play.cubecraft.net</div>
            </div>

            <div class="result-card" id="resultCard">
                <div id="loadingView" class="loading-indicator hidden">
                    <span class="spinner"></span>
                    查询中，请稍候...
                </div>
                <div id="initialPlaceholder" class="initial-placeholder">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4;margin-bottom:8px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <div>输入服务器地址开始查询</div>
                </div>
                <div id="resultView" class="hidden">
                    <div class="server-header">
                        <div class="server-icon">
                            <img id="iconImg" src="" alt="服务器图标" style="display:none;">
                            <span id="noIconPlaceholder" style="font-size:28px; opacity:0.3;">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
                            </span>
                        </div>
                        <div class="server-info">
                            <h2><span id="serverAddress"></span><span class="status-badge" id="statusBadge"></span></h2>
                            <div class="address" id="serverIpPort"></div>
                        </div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-item"><div class="detail-label">玩家数量</div><div class="detail-value" id="playerCount">-</div></div>
                        <div class="detail-item"><div class="detail-label">最大玩家</div><div class="detail-value" id="maxPlayers">-</div></div>
                        <div class="detail-item"><div class="detail-label">游戏版本</div><div class="detail-value" id="versionInfo">-</div></div>
                    </div>
                    <div class="motd-box">
                        <div class="motd-label">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            MOTD
                        </div>
                        <div class="motd-content" id="motdDisplay">-</div>
                    </div>
                    <div id="playersSection" class="players-section hidden">
                        <h4>在线玩家</h4>
                        <div class="players-list" id="playersList"></div>
                    </div>
                    <div id="errorView" class="error-message hidden"></div>
                </div>
            </div>
            <div class="footer-note">数据由 Minecraft ServerHub 与 mcsrvstat.us 提供</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-copy">&copy; 2026 青翔未阔工作室</div>
    </footer>

    <script>
        const serverInput = document.getElementById('serverInput');
        const queryBtn = document.getElementById('queryBtn');
        const loadingView = document.getElementById('loadingView');
        const resultView = document.getElementById('resultView');
        const initialPlaceholder = document.getElementById('initialPlaceholder');
        const errorView = document.getElementById('errorView');
        const serverAddress = document.getElementById('serverAddress');
        const serverIpPort = document.getElementById('serverIpPort');
        const statusBadge = document.getElementById('statusBadge');
        const playerCount = document.getElementById('playerCount');
        const maxPlayers = document.getElementById('maxPlayers');
        const versionInfo = document.getElementById('versionInfo');
        const motdDisplay = document.getElementById('motdDisplay');
        const iconImg = document.getElementById('iconImg');
        const noIconPlaceholder = document.getElementById('noIconPlaceholder');
        const playersSection = document.getElementById('playersSection');
        const playersList = document.getElementById('playersList');

        const API_LIST = [
            (host) => `https://api.mcsrvstat.us/3/${host}`,
            (host) => `https://minecraft-serverhub.com/api/ping?host=${host}&platform=java`,
        ];

        async function queryServer(addr) {
            if (!addr.trim()) return alert('请输入服务器地址');
            loadingView.classList.remove('hidden');
            resultView.classList.add('hidden');
            initialPlaceholder.classList.add('hidden');
            errorView.classList.add('hidden');
            const host = addr.trim();
            for (const builder of API_LIST) {
                try {
                    const r = await fetch(builder(host));
                    if (!r.ok) throw new Error(`API ${r.status}`);
                    const raw = await r.json();
                    const data = normalize(raw);
                    if (!data.online && data.error) throw new Error(data.error);
                    render(data, host); return;
                } catch (err) { /* try next API */ }
            }
            loadingView.classList.add('hidden');
            errorView.classList.remove('hidden');
            errorView.innerHTML = '❌ 查询失败，请检查服务器地址或稍后重试。';
            resultView.classList.remove('hidden');
        }

        function normalize(raw) {
            const online = raw.online === true;
            const players = raw.players && raw.players.online !== undefined ? raw.players.online : (raw.players ?? null);
            const max = raw.players && raw.players.max !== undefined ? raw.players.max : (raw.max_players ?? null);
            const version = raw.version || (raw.protocol && raw.protocol.name) || null;
            const motdHtml = Array.isArray(raw.motd && raw.motd.html) ? raw.motd.html.join('<br>') : (raw.motd_html || null);
            const motdClean = Array.isArray(raw.motd && raw.motd.clean) ? raw.motd.clean.join('\n') : (raw.motd_clean || null);
            const favicon = raw.icon || raw.favicon || raw.favicon_url || null;
            const ip = raw.ip || raw.hostname || null;
            const port = raw.port || 25565;
            const onlinePlayers = (raw.players && raw.players.list) ? raw.players.list.map(p => ({ name: p.name || p })) : (raw.online_players || []);
            return { online, players, max, version, motdHtml, motdClean, favicon, ip, port, onlinePlayers };
        }

        function render(data, queried) {
            loadingView.classList.add('hidden');
            resultView.classList.remove('hidden');
            serverAddress.textContent = queried;
            serverIpPort.textContent = `${data.ip || '未知 IP'}:${data.port}`;
            const online = data.online === true;
            statusBadge.textContent = online ? '在线' : '离线';
            statusBadge.className = `status-badge ${online ? 'online' : 'offline'}`;
            if (data.favicon) { iconImg.src = data.favicon; iconImg.style.display = 'block'; noIconPlaceholder.style.display = 'none'; }
            else { iconImg.style.display = 'none'; noIconPlaceholder.style.display = 'inline'; }
            if (online) {
                playerCount.textContent = data.players !== null ? data.players : '-';
                maxPlayers.textContent = data.max !== null ? data.max : '-';
                versionInfo.textContent = data.version || '-';
                motdDisplay.innerHTML = data.motdHtml || esc(data.motdClean || '-');
                if (data.onlinePlayers && data.onlinePlayers.length > 0) {
                    playersSection.classList.remove('hidden');
                    playersList.innerHTML = data.onlinePlayers.map(p => `<span class="player-tag">${esc(p.name)}</span>`).join('');
                } else { playersSection.classList.add('hidden'); }
            } else {
                playerCount.textContent = '-'; maxPlayers.textContent = '-'; versionInfo.textContent = '-';
                motdDisplay.textContent = '服务器离线或无法连接';
                playersSection.classList.add('hidden');
            }
            errorView.classList.add('hidden');
        }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        queryBtn.addEventListener('click', () => queryServer(serverInput.value));
        serverInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') queryServer(serverInput.value); });
    </script>
</body>
</html>
