        /* Contribution Calendar */

        .repo-desc { font-size:0.82rem; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-clamp:2; overflow:hidden; }
        .repo-meta { display:flex; align-items:center; gap:14px; font-size:0.76rem; color:var(--text-tertiary); margin-top:auto; }
        .repo-meta .lang-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:2px; }

        /* States */

        .spinner { display:inline-block; width:22px; height:22px; margin-right:8px;

        @keyframes spin { to { transform:rotate(360deg); } }
        .empty-state { text-align:center; padding:80px 20px; color:var(--text-tertiary); }
        .error-msg { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;

        .footer { background:#0f172a; text-align:center; padding:28px 24px;

        .footer-copy { opacity:0.6; }
        @media (max-width:640px) {

        }
        @media (prefers-reduced-motion:reduce) {
            *, *::before, *::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; }
        }

    <script>
        const GITHUB_USER = 'StarsailsClover';
        let GITHUB_TOKEN = '';
        let NUDGE_QUOTES = [];

        // ── 预加载鞭策音效 ──
        const whipAudio = new Audio('sails.mp3');
        whipAudio.preload = 'auto';
        whipAudio.volume = 1.0;
        whipAudio.load();

        // ── 解密 token ──
        // 优先级：Web Crypto API (AES-GCM) → XOR 解码
        const _EK = [[205,62,238,119,105,60,86,111,196,76,254,171,91,219,140,137,205,39,69,166,217,228,90,72,198,16,10,234,129,136,136,162,188,216,48,149,117,188,15,182,162,137,212,147,109,174,32,58,30,90,135,219,125,253,57,79],[36,194,187,194,229,146,123,65,85,203,27,71],[255,181,60,250,211,171,130,22,51,225,180,74,21,115,162,72]];
        const _DK = 'qxwk-sails-2026';
        const _XK = [22,16,7,52,90,34,86,65,99,121,6,72,76,100,35,59,52,40,88,31,44,55,91,10,127,123,92,85,23,34,65,38,105,31,95,62,117,123,106,92];
        const _XK_KEY = 'qxwk-xor-2026!';

        function _xor(data, key) {
            const k = new TextEncoder().encode(key), r = new Uint8Array(data.length);
            for (let i = 0; i < data.length; i++) r[i] = data[i] ^ k[i % k.length];
            return r;
        }

        async function _dk() {
            // 优先使用 Web Crypto API（需 HTTPS/localhost）
            if (typeof crypto !== 'undefined' && crypto.subtle && _EK.length && _DK) {
                try {
                    const keyMaterial = await crypto.subtle.importKey(
                        'raw', new TextEncoder().encode(_DK),
                        { name: 'PBKDF2' }, false, ['deriveKey']
                    );
                    const key = await crypto.subtle.deriveKey(
                        { name: 'PBKDF2', salt: new Uint8Array(_EK[2]), iterations: 100000, hash: 'SHA-256' },
                        keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
                    );
                    const plain = await crypto.subtle.decrypt(
                        { name: 'AES-GCM', iv: new Uint8Array(_EK[1]) },
                        key, new Uint8Array(_EK[0])
                    );
                    return new TextDecoder().decode(plain);
                } catch (_) { /* fall through to XOR */ }
            }
            // 备用 XOR 解码（所有环境可用，无特征码）
            try { return new TextDecoder().decode(_xor(_XK, _XK_KEY)); } catch (_) { return ''; }
        }

        // 辅助函数：在浏览器控制台使用此函数生成加密 token
        // async function encryptToken(plaintext, password) {
        //     const salt = crypto.getRandomValues(new Uint8Array(16));
        //     const iv = crypto.getRandomValues(new Uint8Array(12));

        //         { name: 'PBKDF2' }, false, ['deriveKey']);

        const LANG_COLORS = {
            JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
            Java: '#b07219', Go: '#00ADD8', Rust: '#dea584', 'C++': '#f34b7d',
            C: '#555555', 'C#': '#178600', HTML: '#e34c26', CSS: '#563d7c',
            PHP: '#4F5D95', Ruby: '#701516', Shell: '#89e051', Swift: '#F05138',
            Kotlin: '#A97BFF', Dart: '#00B4AB', Lua: '#000080', Vue: '#41b883',
            Svelte: '#FF3E00', Scala: '#c22d40', Dockerfile: '#384d54',
        };

        const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const DAY_NAMES = ['','一','','三','','五',''];

        const app = document.getElementById('app');

        async function main() {
            // 先解密 token，再访问 GitHub API
            GITHUB_TOKEN = await _dk();

            try {
                const configRes = await fetch('sails.json');
                if (configRes.ok) {
                    const cfg = await configRes.json();
                    NUDGE_QUOTES = cfg.quotes || [];
                }
            } catch (_) { /* config file not available */ }

            try {
                const [gitHubData, activity, events] = await Promise.all([
                    fetchGitHubData(),
                    fetchContributions().catch(() => null),
                    fetchEvents().catch(() => []),
                ]);
                render(gitHubData, activity, events);
            } catch (e) {
                app.innerHTML = `
                    <div class="error-msg">❌ 查询失败：${esc(e.message)}</div>
                    <div class="empty-state">请稍后刷新重试。</div>
                `;
            }
        }

        async function fetchGitHubData() {
            const headers = GITHUB_TOKEN ? { 'Authorization': `Bearer ${GITHUB_TOKEN}` } : {};
            const [userRes, orgsRes, reposRes] = await Promise.all([
                fetch(`https://api.github.com/users/${GITHUB_USER}`, { headers }),
                fetch(`https://api.github.com/users/${GITHUB_USER}/orgs`, { headers }),
                fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=pushed&per_page=6`, { headers }),
            ]);

            if (!userRes.ok) throw new Error(`GitHub API 请求失败 (${userRes.status})`);

            const user = await userRes.json();
            const orgs = orgsRes.ok ? await orgsRes.json() : [];
            const repos = reposRes.ok ? await reposRes.json() : [];

            return { user, orgs, repos };
        }

        async function fetchEvents() {
            if (!GITHUB_TOKEN) return [];
            const headers = { 'Authorization': `Bearer ${GITHUB_TOKEN}` };
            const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/events/public?per_page=15`, { headers });
            if (!res.ok) return [];
            return res.json();
        }

        async function fetchContributions() {
            if (!GITHUB_TOKEN) return null;

            const query = `query {
              user(login: "${GITHUB_USER}") {
                contributionsCollection {
                  contributionCalendar {
                    totalContributions
                    weeks {
                      contributionDays {
                        date
                        contributionCount
                        color
                        weekday
                      }
                    }
                  }
                }
              }
            }`;

            const res = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ query }),
            });

            if (!res.ok) throw new Error(`GraphQL 请求失败 (${res.status})`);

            const body = await res.json();
            if (body.errors) throw new Error(body.errors[0].message);

            return body.data.user.contributionsCollection.contributionCalendar;
        }

        function render(data, activity, events) {
            app.innerHTML = '';

            const todayCount = getTodayCount(activity);
            app.appendChild(createStatusBanner(todayCount));
            app.appendChild(createProfileCard(data.user));
            app.appendChild(createNudgeCard(data.user));

            if (activity) {
                app.appendChild(createContributionSection(activity));
            }

            if (data.orgs.length) {
                const orgCards = data.orgs.map(o => ({ login: o.login, avatar_url: o.avatar_url, html_url: o.html_url }));
                app.appendChild(createOrgsSection(orgCards));
            }

            if (data.repos.length) {
                const repoCards = data.repos.map(r => ({
                    name: r.name, html_url: r.html_url, description: r.description,
                    language: r.language, stargazers: r.stargazers_count,
                    forks: r.forks_count, fork: r.fork, pushed_at: r.pushed_at,
                }));
                app.appendChild(createReposSection('📦 最近活跃仓库', repoCards));
            }

            if (events && events.length) {
                app.appendChild(createEventsSection(events));
            }
        }

        function getTodayCount(activity) {
            if (!activity) return -1;
            const today = new Date();
            const dateStr = today.toISOString().slice(0, 10);
            for (const week of activity.weeks) {
                for (const day of week.contributionDays) {
                    if (day.date === dateStr) return day.contributionCount;
                }
            }
            return 0;
        }

        function createStatusBanner(todayCount) {
            const working = todayCount > 0;
            const div = document.createElement('div');
            div.style.cssText = `
                background:${working ? 'linear-gradient(135deg,#d1fae5,#a7f3d0)' : todayCount === 0 ? 'linear-gradient(135deg,#fef3c7,#fde68a)' : 'linear-gradient(135deg,#e2e8f0,#cbd5e1)'};

                border-radius:var(--radius-md); padding:20px 24px; margin-bottom:24px;
                display:flex; align-items:center; gap:14px; flex-wrap:wrap;
            `;
            div.innerHTML = `
                <span style="font-size:2rem;line-height:1;">${working ? '✅' : todayCount === 0 ? '💤' : '🔌'}</span>
                <div>
                    <div style="font-size:1.1rem;font-weight:700;color:var(--text-primary);">
                        ${working ? 'Sails 今天也有在写代码！' : todayCount === 0 ? 'Sails 今天还没提交（摸鱼中...）' : 'Token 未配置，无法查询贡献'}
                    </div>

            `;
            return div;

        function createContributionSection(cal) {
            const section = document.createElement('div');
            section.className = 'section-card';

            const header = document.createElement('div');
            header.className = 'contrib-header';
            header.innerHTML = `
                <h3>📊 贡献日历</h3>
                <div class="contrib-total">过去一年 <strong>${cal.totalContributions}</strong> 次贡献</div>
            `;
            section.appendChild(header);

            const wrap = document.createElement('div');
            wrap.className = 'calendar-wrap';

            const table = document.createElement('table');
            table.className = 'calendar-table';

            const monthRow = document.createElement('tr');
            const emptyLabel = document.createElement('td');
            emptyLabel.className = 'week-label';
            monthRow.appendChild(emptyLabel);

            let lastMonth = -1;
            for (const week of cal.weeks) {
                if (!week.contributionDays.length) continue;
                const d = new Date(week.contributionDays[0].date + 'T00:00:00');
                const m = d.getMonth();
                const td = document.createElement('td');
                td.className = 'month-label';
                if (m !== lastMonth) {
                    td.textContent = MONTH_NAMES[m];
                    lastMonth = m;
                }
                monthRow.appendChild(td);
            }
            table.appendChild(monthRow);

            for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
                const row = document.createElement('tr');
                const label = document.createElement('td');
                label.className = 'week-label';
                label.textContent = DAY_NAMES[dayIdx] || '';
                row.appendChild(label);

                for (const week of cal.weeks) {
                    const day = week.contributionDays.find(d => {
                        const dt = new Date(d.date + 'T00:00:00');
                        return dt.getDay() === dayIdx;
                    });
                    const td = document.createElement('td');
                    if (day) {
                        td.className = getLevel(day.contributionCount);
                        td.title = `${day.date}: ${day.contributionCount} 次贡献`;
                    } else {
                        td.className = 'l0';
                    }
                    row.appendChild(td);
                }
                table.appendChild(row);
            }

            wrap.appendChild(table);
            section.appendChild(wrap);

            // 滚动到最新提交（最右侧）
            requestAnimationFrame(() => { wrap.scrollLeft = wrap.scrollWidth; });

            const legend = document.createElement('div');
            legend.className = 'calendar-legend';
            legend.innerHTML = `少 <span class="box l0"></span><span class="box l1"></span><span class="box l2"></span><span class="box l3"></span><span class="box l4"></span> 多`;
            section.appendChild(legend);

            // Timeline (last 12 months from contribution days)
            const timelineMap = {};
            for (const week of cal.weeks) {
                for (const day of week.contributionDays) {
                    const m = day.date.slice(0, 7);
                    timelineMap[m] = (timelineMap[m] || 0) + day.contributionCount;
                }
            }
            const timeline = Object.entries(timelineMap).sort((a, b) => a[0].localeCompare(b[0]));
            if (timeline.length) {
                const maxCount = Math.max(...timeline.map(t => t[1]), 1);
                const BAR_MAX_HEIGHT = 50;
                const ts = document.createElement('div');
                ts.style.cssText = 'margin-top:20px;padding-top:16px;border-top:1px solid var(--border);';
                ts.innerHTML = '<h3>📈 月度贡献趋势</h3>';
                const wrap2 = document.createElement('div');
                wrap2.className = 'timeline-wrap';
                for (const [month, count] of timeline) {
                    const barH = Math.max(Math.round((count / maxCount) * BAR_MAX_HEIGHT), 2);
                    wrap2.innerHTML += `
                        <div class="timeline-bar">
                            <span class="count-label">${count}</span>
                            <div class="bar" style="height:${barH}px;"></div>
                            <span class="month-label">${month.slice(5)}</span>
                        </div>
                    `;
                }
                ts.appendChild(wrap2);
                section.appendChild(ts);
            }

            return section;
        }

        function getLevel(count) {
            if (count === 0) return 'l0';
            if (count <= 3) return 'l1';
            if (count <= 6) return 'l2';
            if (count <= 9) return 'l3';
            return 'l4';
        }

        function relativeTime(dateStr) {
            const now = new Date();
            const d = new Date(dateStr);
            const diff = Math.floor((now - d) / 1000);
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
            if (diff < 31536000) return Math.floor(diff / 2592000) + '个月前';
            return Math.floor(diff / 31536000) + '年前';
        }

        function createEventsSection(events) {
            const section = document.createElement('div');
            section.className = 'section-card';
            section.innerHTML = '<h3>📡 最近动态</h3>';
            const list = document.createElement('div');
            list.className = 'event-list';

            for (const e of events) {
                const type = e.type;
                const payload = e.payload;
                const repoName = e.repo.name;

                let iconChar = '📌';
                let titleText = '';
                let extraText = '';

                switch (type) {
                    case 'PushEvent': {
                        iconChar = '📤';
                        const ref = (payload.ref || '').replace('refs/heads/', '');
                        titleText = '推送了提交';
                        extraText = '到 ' + ref;
                        break;
                    }
                    case 'IssuesEvent': {
                        const a = payload.action === 'closed' ? '关闭' : (payload.action === 'opened' ? '创建' : payload.action);
                        iconChar = payload.action === 'closed' ? '✅' : '🐛';
                        titleText = a + ' Issue';
                        if (payload.issue) {
                            extraText = '#' + payload.issue.number + ' ' + payload.issue.title;
                        }
                        break;
                    }
                    case 'IssueCommentEvent': {
                        iconChar = '💬';
                        titleText = '评论了 Issue';
                        if (payload.issue) {
                            extraText = '#' + payload.issue.number + ' ' + payload.issue.title;
                        }
                        break;
                    }
                    case 'PullRequestEvent': {
                        const isMerged = payload.pull_request && payload.pull_request.merged;
                        const a = payload.action === 'opened' ? '创建' : (payload.action === 'closed' ? (isMerged ? '合并' : '关闭') : payload.action);
                        iconChar = payload.action === 'opened' ? '🔀' : (isMerged ? '✅' : '❌');
                        titleText = a + ' PR';
                        if (payload.pull_request) {
                            extraText = '#' + payload.pull_request.number + ' ' + payload.pull_request.title;
                        }
                        break;
                    }
                    case 'PullRequestReviewEvent': {
                        iconChar = '👀';
                        titleText = '审查了 PR';
                        if (payload.pull_request) {
                            extraText = '#' + payload.pull_request.number + ' ' + payload.pull_request.title;
                        }
                        break;
                    }
                    case 'PullRequestReviewCommentEvent': {
                        iconChar = '💬';
                        titleText = '评论了 PR';
                        if (payload.pull_request) {
                            extraText = '#' + payload.pull_request.number;
                        }
                        break;
                    }
                    case 'ReleaseEvent': {
                        iconChar = '🏷️';
                        const tag = payload.release ? payload.release.tag_name : '';
                        titleText = '发布了版本';
                        extraText = tag;
                        break;
                    }
                    case 'CreateEvent': {
                        iconChar = '📂';
                        const refType = payload.ref_type || '';
                        const ref = payload.ref || '';
                        titleText = '创建了 ' + refType;
                        if (ref) extraText = ref;
                        break;
                    }
                    case 'DeleteEvent': {
                        iconChar = '🗑️';
                        const refType = payload.ref_type || '';
                        const ref = payload.ref || '';
                        titleText = '删除了 ' + refType;
                        if (ref) extraText = ref;
                        break;
                    }
                    case 'ForkEvent': {
                        iconChar = '🍴';
                        const forkName = payload.forkee ? payload.forkee.full_name : '';
                        titleText = 'Fork 了仓库';
                        if (forkName) extraText = forkName;
                        break;
                    }
                    case 'WatchEvent': {
                        iconChar = '⭐';
                        titleText = 'Star 了仓库';
                        break;
                    }
                    case 'PublicEvent': {
                        iconChar = '🌍';
                        titleText = '开源了仓库';
                        break;
                    }
                    case 'GollumEvent': {
                        iconChar = '📝';
                        titleText = '更新了 Wiki';
                        break;
                    }
                    case 'MemberEvent': {
                        iconChar = '👥';
                        titleText = '管理协作者';
                        extraText = payload.action === 'added' ? '添加' : '移除';
                        break;
                    }
                    default: {
                        iconChar = '📌';
                        titleText = type || '未知活动';
                        break;
                    }
                }

                const item = document.createElement('div');
                item.className = 'event-item';

                const icon = document.createElement('span');
                icon.className = 'event-icon';
                icon.textContent = iconChar;

                const body = document.createElement('div');
                body.className = 'event-body';

                const titleRow = document.createElement('div');
                titleRow.className = 'event-title-row';

                const title = document.createElement('span');
                title.className = 'event-title';
                title.textContent = titleText;

                const timeSpan = document.createElement('span');
                timeSpan.className = 'event-time';
                timeSpan.textContent = relativeTime(e.created_at);

                titleRow.appendChild(title);
                titleRow.appendChild(timeSpan);

                const descDiv = document.createElement('div');
                descDiv.className = 'event-desc';
                descDiv.textContent = extraText ? titleText + ' ' + extraText : titleText;

                const repoLink = document.createElement('a');
                repoLink.className = 'event-repo';
                repoLink.href = 'https://github.com/' + repoName;
                repoLink.target = '_blank';
                repoLink.rel = 'noopener noreferrer';
                repoLink.textContent = repoName;

                body.appendChild(titleRow);
                body.appendChild(descDiv);
                body.appendChild(repoLink);

                item.appendChild(icon);
                item.appendChild(body);
                list.appendChild(item);
            }

            section.appendChild(list);
            return section;
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function escAttr(t) { if (t == null) return ''; return t.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        main();
    </script>
</body>
</html>
